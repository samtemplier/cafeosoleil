<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte du soleil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.js"></script>

<!-- Plugin de recherche d'adresse Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">

<!-- Recherche floue (typos, variantes d'orthographe) dans l'index local des cafés,
     voir data/cafes-index.json et rechercheDansIndexLocal plus bas : remplace les
     appels réseau à Overpass à chaque frappe par une recherche 100% en mémoire. -->
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>

<style>
  body { margin: 0; padding: 0; overscroll-behavior-y: none; }

  #map {
    position: absolute;
    top: 0; bottom: 0; width: 100%;
  }

  #panneau-controle {
    position: absolute;
    top: 12px; left: 12px;
    z-index: 10;
    background: white;
    padding: 12px 14px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    font-family: sans-serif;
    font-size: 13px;
    /* largeur fixe (pas juste min-width) : un absolute sans largeur explicite s'élargit
       pour éviter de faire retourner à la ligne le texte le plus long qu'il contient
       (ex. le message "dézoom trop important…"), au lieu de le laisser passer à la ligne. */
    width: 230px;
    box-sizing: border-box;
    transition: padding 0.2s;
  }

  /* Bouton toggle pour replier/déplier le panneau */
  #toggle-panneau {
    position: absolute;
    top: 6px; right: 6px;
    width: 26px; height: 26px;
    border: none;
    background: #f0f0f0;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color: #666;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #toggle-panneau:hover { background: #e0e0e0; }

  #resume-compact {
    display: none;
    align-items: center;
    gap: 10px;
    padding-right: 32px; /* place pour le bouton */
    font-size: 15px;
  }
  #resume-compact #resume-heure { font-weight: 600; color: #333; }
  #resume-compact #resume-date { color: #888; font-size: 12px; }

  /* État replié (desktop) : on cache le contenu et on affiche le résumé compact.
     Le replié reprend une largeur au contenu (petit) plutôt que les 230px du panneau
     déplié. Sur mobile, tout ceci est remplacé par le mécanisme de la media query
     ci-dessous (hauteur animée en JS, résumé et contenu superposés en fondu). */
  #panneau-controle.replie #panneau-contenu { display: none; }
  #panneau-controle.replie #resume-compact { display: flex; }
  #panneau-controle.replie { padding: 8px 12px; width: auto; min-width: 0; }

  /* Poignée de la feuille du bas (visible uniquement sur mobile, voir media query) */
  #poignee-panneau { display: none; }

  /* Sur mobile (écran étroit OU bas, ex. téléphone en paysage) : le panneau devient une
     feuille ancrée en bas de l'écran (façon Google Maps), qu'on ouvre/ferme en tapant,
     glissant, ou en tapant la carte — voir initPanneau() dans le script. */
  @media (max-width: 600px), (max-height: 500px) {
    #panneau-controle {
      position: fixed;
      top: auto; left: 0; right: 0; bottom: 0;
      width: 100%;
      max-width: 100%;
      border-radius: 16px 16px 0 0;
      padding: 0 16px calc(10px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -3px 14px rgba(0,0,0,0.18);
      box-sizing: border-box;
      font-size: 12.5px;
    }
    /* Zone de la poignée agrandie pour être facile à attraper au doigt : la barre
       visible (::after) est petite, mais toute cette zone est tapable/glissable. */
    #poignee-panneau {
      display: block;
      width: 100%;
      height: 24px;
      position: relative;
      cursor: pointer;
      touch-action: none; /* empêche Safari iOS de traiter le glissement comme un scroll/rebond de page */
    }
    #poignee-panneau::after {
      content: "";
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 4px;
      background: #ddd;
      border-radius: 2px;
    }

    /* Wrapper dont la hauteur est animée en JS entre l'état replié (juste assez pour
       le résumé) et déplié (tout le contenu, plafonné). Résumé et contenu sont tous
       deux toujours présents et superposés, on fait un fondu enchaîné entre eux plutôt
       que display:none — ça permet une animation fluide de la feuille (hauteur + fondu)
       qui suit le doigt pendant un glissement, au lieu d'un basculement net. */
    #panneau-feuille {
      position: relative;
      overflow: hidden;
      transition: height 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #panneau-feuille.glissement-actif { transition: none; }

    #panneau-controle #resume-compact {
      display: flex;
      position: absolute;
      top: 0; left: 0; right: 0;
      background: white;
      cursor: pointer;
      justify-content: center;
      padding: 2px 0;
      transition: opacity 0.2s ease;
      touch-action: none;
    }
    #panneau-controle.replie #resume-compact { opacity: 1; pointer-events: auto; }
    #panneau-controle:not(.replie) #resume-compact { opacity: 0; pointer-events: none; }

    #panneau-controle.replie #panneau-contenu { display: block; } /* toujours rendu sur mobile */
    #panneau-controle #panneau-contenu {
      max-width: 100%;
      max-height: min(60vh, calc(100dvh - 150px));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 2px; /* évite que la scrollbar chevauche le contenu */
      padding-bottom: 4px;
    }
    #panneau-controle #section-poi { margin-top: 7px; padding-top: 7px; }
    #panneau-controle .mapboxgl-ctrl-geocoder,
    #panneau-controle input[type="date"] { margin-bottom: 7px; }

    /* Safari iOS zoome automatiquement la page quand on tape dans un champ dont la
       taille de police est < 16px (pour rester lisible) — c'est ce zoom qui fait
       ensuite déborder le panneau replié/déplié à l'écran. Le seuil de 16px désactive
       ce comportement, sans changer la taille compacte utilisée ailleurs sur desktop. */
    #panneau-controle .mapboxgl-ctrl-geocoder input,
    #panneau-controle input[type="date"] {
      font-size: 16px !important;
    }

    /* L'astuce clic-droit ne s'applique qu'au desktop (pas de clic droit tactile),
       et chevaucherait la feuille du bas : on la masque sur mobile. */
    #astuce-3d { display: none; }
  }
  #panneau-controle label {
    display: block;
    margin-bottom: 4px;
    color: #555;
  }
  #panneau-controle input[type="date"] {
    margin-bottom: 8px;
    width: 100%;
    box-sizing: border-box;
  }

  /* Slider de temps */
  #conteneur-slider {
    margin-top: 4px;
  }
  #label-heure {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }
  #label-heure span { color: #555; }
  #affichage-heure {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    font-variant-numeric: tabular-nums;
  }
  #slider-heure {
    width: 100%;
    margin: 0;
    accent-color: #e07a3f;
    cursor: pointer;
  }
  #axe-heures {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #bbb;
    margin-top: 2px;
  }
  #statut { margin-top: 4px; color: #888; font-style: italic; }
  #message-zoom { display: none; color: #a05a2c; margin-top: 4px; }

  /* Popup d'ensoleillement au clic */
  .popup-soleil {
    font-family: sans-serif;
    min-width: 220px;
  }
  .popup-soleil h4 {
    margin: 0 0 8px 0;
    font-size: 13px;
    color: #333;
  }
  .frise-journee {
    display: flex;
    height: 22px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .frise-journee .segment {
    height: 100%;
  }
  .frise-journee .segment.soleil { background: #f0b94a; }
  .frise-journee .segment.ombre  { background: #4a6fa5; opacity: 0.7; }
  .frise-journee .segment.nuit   { background: #1a1a2e; opacity: 0.35; }
  .axe-frise {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #aaa;
    margin-bottom: 6px;
  }
  .legende-frise {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: #555;
  }
  .legende-frise span { display: flex; align-items: center; gap: 4px; }
  .legende-frise .puce {
    width: 10px; height: 10px; border-radius: 2px; display: inline-block;
  }

  /* Intégration de la barre de recherche dans le panneau.
     min-width: 240px vient de la feuille de style par défaut du plugin — sans l'annuler,
     la barre reste forcée à 240px de large même sur un panneau de 230px (padding compris),
     donc elle déborde du cadre. */
  .mapboxgl-ctrl-geocoder {
    box-shadow: none !important;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    margin-bottom: 10px;
    font-size: 13px !important;
  }
  .mapboxgl-ctrl-geocoder input {
    font-size: 13px !important;
    padding: 6px 36px !important;
  }
  .mapboxgl-ctrl-geocoder .mapboxgl-ctrl-geocoder--icon-search {
    top: 8px !important;
    left: 8px !important;
  }

  /* Filtres centres d'intérêt */
  #section-poi {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
  }
  #section-poi .titre-section {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 7px;
  }
  #filtres-categorie {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }
  .btn-categorie {
    padding: 4px 9px;
    border-radius: 12px;
    border: 1.5px solid #ddd;
    background: white;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.4; /* masqué par défaut (visuellement grisé) */
  }
  .btn-categorie:hover { border-color: #aaa; opacity: 0.7; }
  .btn-categorie.actif {
    background: #e07a3f;
    border-color: #e07a3f;
    color: white;
    font-weight: 600;
    opacity: 1; /* bien visible quand actif */
  }
  #filtre-soleil-uniquement {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #444;
    cursor: pointer;
    user-select: none;
    margin-top: 2px;
  }
  #filtre-soleil-uniquement input[type="checkbox"] {
    accent-color: #e07a3f;
    width: 14px;
    height: 14px;
    cursor: pointer;
  }
  #btn-chercher-zone {
    display: block;
    width: 100%;
    margin-top: 9px;
    padding: 8px 10px;
    border: none;
    border-radius: 8px;
    background: #e07a3f;
    color: white;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #btn-chercher-zone:hover:not(:disabled) { opacity: 0.85; }
  #btn-chercher-zone:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  #statut-recherche-poi {
    margin-top: 6px;
    font-size: 11.5px;
    color: #888;
  }
  #statut-recherche-poi.avertissement { color: #a05a2c; }

  #astuce-3d {
    position: absolute;
    bottom: 12px; left: 12px;
    z-index: 10;
    background: rgba(255,255,255,0.9);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: sans-serif;
    font-size: 12px;
    color: #555;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="panneau-controle">
  <div id="poignee-panneau"></div>
  <button id="toggle-panneau" title="Réduire / déplier">
    <span id="toggle-icone">−</span>
  </button>
  <!-- panneau-feuille : wrapper dont la hauteur est animée en JS (voir initPanneau) pour
       le glissement fluide sur mobile ; résumé et contenu sont superposés et se fondent
       l'un dans l'autre plutôt que de basculer net via display:none. -->
  <div id="panneau-feuille">
    <div id="panneau-contenu">
      <div id="conteneur-recherche"></div>
      <label for="input-date">Date</label>
      <input type="date" id="input-date">

      <div id="conteneur-slider">
        <div id="label-heure">
          <span>Heure</span>
          <span id="affichage-heure">12:00</span>
        </div>
        <input type="range" id="slider-heure" min="0" max="1439" step="5" value="720">
        <div id="axe-heures">
          <span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span>
        </div>
      </div>
      <div id="statut">Chargement...</div>
      <div id="message-zoom">Dézoom trop important — rapprochez-vous pour voir les ombres.</div>

      <div id="section-poi">
        <div class="titre-section">Lieux d'intérêt</div>
        <div id="filtres-categorie">
          <button class="btn-categorie actif" data-categorie="cafe">☕ Cafés</button>
        </div>
        <label id="filtre-soleil-uniquement">
          <input type="checkbox" id="checkbox-soleil"> Uniquement au soleil ☀️
        </label>
        <button id="btn-chercher-zone">🔍 Chercher les cafés dans cette zone</button>
        <div id="statut-recherche-poi"></div>
      </div>
    </div>
    <!-- Résumé compact affiché quand le panneau est replié (mobile essentiellement) -->
    <div id="resume-compact">
      <span id="resume-heure">12:00</span>
      <span id="resume-date"></span>
    </div>
  </div>
</div>

<div id="astuce-3d">🧭 Clic droit + glisser pour incliner / tourner la vue en 3D</div>

<script>
  // ============================================================
  // Clé Mapbox
  // ============================================================
  mapboxgl.accessToken = "pk.eyJ1Ijoic2FtdGVtcCIsImEiOiJjbXIzOTVoNmkwMmJ1Mnpxd21udGNobzJrIn0.31QMwKd5W0icWIx9VOq2YA";

  const CENTRE_DEPART = [2.3437, 48.8482]; // Sorbonne
  const refLon = CENTRE_DEPART[0];
  const refLat = CENTRE_DEPART[1];

  const METRES_PAR_DEGRE_LAT = 111320;
  const METRES_PAR_DEGRE_LON = METRES_PAR_DEGRE_LAT * Math.cos(refLat * Math.PI / 180);

  // Les noms de lieux viennent d'OpenStreetMap, modifiable par n'importe qui : on les
  // échappe avant de les insérer dans du HTML (popup) pour éviter qu'un nom malveillant
  // (ex. <img src=x onerror=...>) ne s'exécute dans le navigateur d'un visiteur.
  function echapperHtml(texte) {
    return String(texte).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function gpsVersMetres(lon, lat) {
    return { x: (lon - refLon) * METRES_PAR_DEGRE_LON, z: (lat - refLat) * METRES_PAR_DEGRE_LAT };
  }
  function metresVersGps(x, z) {
    return { lon: refLon + x / METRES_PAR_DEGRE_LON, lat: refLat + z / METRES_PAR_DEGRE_LAT };
  }

  // Extrait les bâtiments actuellement chargés par Mapbox sous la forme {h, ring}
  // (hauteur en mètres + premier anneau du polygone en coordonnées GPS), prête pour
  // estDansOmbre. Partagé par afficherPOI() et calculerFriseJournee() pour éviter de
  // reparser la géométrie des bâtiments à chaque appel.
  function extraireBatimentsVisibles() {
    const batiments = [];
    for (const f of map.querySourceFeatures("composite", { sourceLayer: "building", filter: ["==", "extrude", "true"] })) {
      if (!f.geometry) continue;
      let h = parseFloat(f.properties.height); if (isNaN(h) || h <= 0) h = 18;
      const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates]
        : f.geometry.type === "MultiPolygon" ? f.geometry.coordinates : null;
      if (!polys) continue;
      for (const rings of polys) if (rings[0]?.length >= 3) batiments.push({ h, ring: rings[0] });
    }
    return batiments;
  }

  // Teste si le point (x, z en mètres) tombe dans l'ombre d'au moins un des bâtiments
  // pré-extraits (voir extraireBatimentsVisibles) : on remonte depuis ce point vers le
  // soleil à la hauteur de chaque bâtiment (offsetX/offsetZ = mètres d'ombre au sol par
  // mètre de hauteur, dans la direction du soleil) et on teste si le point remonté tombe
  // à l'intérieur du bâtiment (ray casting 2D). Partagé par afficherPOI() et
  // calculerFriseJournee() : avant, ce test était dupliqué (et recalculé inutilement à
  // chaque frappe de la boucle horaire de calculerFriseJournee, ~100 fois par clic).
  function estDansOmbre(x, z, offsetX, offsetZ, batiments) {
    for (const bat of batiments) {
      const t = metresVersGps(x - offsetX * bat.h, z - offsetZ * bat.h);
      let dedans = false;
      for (let a = 0, b = bat.ring.length - 1; a < bat.ring.length; b = a++) {
        const [xa, ya] = bat.ring[a], [xb, yb] = bat.ring[b];
        if (((ya > t.lat) !== (yb > t.lat)) && t.lon < (xb - xa) * (t.lat - ya) / (yb - ya) + xa) dedans = !dedans;
      }
      if (dedans) return true;
    }
    return false;
  }

  // ============================================================
  // Carte Mapbox
  // ============================================================
  const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/light-v11",
    center: CENTRE_DEPART,
    zoom: 17,
    pitch: 60,
    bearing: -17,
    antialias: true
  });

  map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), "top-right");

  // Bouton de géolocalisation (façon Google Maps) : centre la carte sur la position
  // exacte de l'utilisateur au clic, avec cercle de précision et suivi en direct.
  map.addControl(new mapboxgl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true
  }), "top-right");

  // ============================================================
  // Garde-fou : on plafonne la zone de calcul à un rayon fixe autour
  // du centre pour éviter un nombre démesuré de bâtiments à traiter.
  // ============================================================
  const RAYON_CALCUL_METRES = 700;

  function obtenirZoneDeCalcul() {
    const centre = map.getCenter();
    const centreM = gpsVersMetres(centre.lng, centre.lat);
    const vue = map.getBounds();
    const clamp = (v, c) => !isFinite(v) ? c + RAYON_CALCUL_METRES : Math.max(c - RAYON_CALCUL_METRES, Math.min(c + RAYON_CALCUL_METRES, v));
    const minBrut = gpsVersMetres(vue.getWest(), vue.getSouth());
    const maxBrut = gpsVersMetres(vue.getEast(), vue.getNorth());
    return {
      xMin: clamp(minBrut.x, centreM.x), xMax: clamp(maxBrut.x, centreM.x),
      zMin: clamp(minBrut.z, centreM.z), zMax: clamp(maxBrut.z, centreM.z)
    };
  }

  function affichageLimite() {
    const vue = map.getBounds();
    const min = gpsVersMetres(vue.getWest(), vue.getSouth());
    const max = gpsVersMetres(vue.getEast(), vue.getNorth());
    const w = max.x - min.x, h = max.z - min.z;
    return !isFinite(w) || !isFinite(h) || w > RAYON_CALCUL_METRES * 2.2 || h > RAYON_CALCUL_METRES * 2.2;
  }

  // ============================================================
  // Enveloppe convexe (algorithme de Jarvis, dit "gift wrapping")
  // Prend un tableau de points [x, z] et renvoie leur enveloppe convexe.
  // Utilisé pour construire le polygone d'ombre de chaque bâtiment :
  // on projette chaque sommet du bâtiment dans la direction de l'ombre,
  // puis on calcule l'enveloppe convexe de l'ensemble {sommets originaux +
  // sommets projetés} — ce qui donne la forme exacte de l'ombre au sol
  // pour un bâtiment convexe (très bonne approximation pour les autres).
  // ============================================================
  function enveloppeConvexe(points) {
    const n = points.length;
    if (n < 3) return points;

    // Point le plus à gauche comme point de départ
    let depart = 0;
    for (let i = 1; i < n; i++) if (points[i][0] < points[depart][0]) depart = i;

    const hull = [];
    let courant = depart;
    do {
      hull.push(points[courant]);
      let suivant = (courant + 1) % n;
      for (let i = 0; i < n; i++) {
        // Produit vectoriel : négatif = point i est plus à gauche = plus anti-horaire
        const croix =
          (points[suivant][0] - points[courant][0]) * (points[i][1] - points[courant][1]) -
          (points[suivant][1] - points[courant][1]) * (points[i][0] - points[courant][0]);
        if (croix < 0) suivant = i;
      }
      courant = suivant;
    } while (courant !== depart && hull.length <= n + 1);

    return hull;
  }

  // ============================================================
  // Génération des polygones d'ombre
  //
  // Pour chaque bâtiment visible dans la zone de calcul :
  //   1. On calcule la longueur de l'ombre : hauteur / tan(élévation)
  //   2. On projette chaque sommet du bâtiment dans la direction opposée
  //      au soleil (direction de l'ombre au sol)
  //   3. On calcule l'enveloppe convexe de {sommets + sommets projetés}
  //   4. On renvoie ce polygone comme zone d'ombre GeoJSON
  //
  // Avantage : aucun raycasting, aucune grille — juste de la géométrie.
  // Le rendu est précis, fluide, et les ombres ont la vraie forme des bâtiments.
  // ============================================================
  const batimentsDejaTraites = new Set(); // évite les doublons inter-appels

  function genererOmbresBatiments(dateChoisie) {
    const centre = map.getCenter();
    const position = SunCalc.getPosition(dateChoisie, centre.lat, centre.lng);
    const elevation = position.altitude;
    const azimut = position.azimuth;

    if (elevation <= 0) return { type: "FeatureCollection", features: [] };

    const longueurParMetre = 1 / Math.tan(elevation); // mètres d'ombre au sol par mètre de hauteur
    // Direction de l'ombre au sol (opposée au soleil).
    // SunCalc : azimut 0 = Sud, négatif = Est, positif = Ouest.
    // Vecteur soleil : (-sin(az), -cos(az)) en (x=Est, z=Nord)
    // Vecteur ombre (opposé) : (+sin(az), +cos(az))
    const offsetDirX =  Math.sin(azimut) * longueurParMetre;
    const offsetDirZ =  Math.cos(azimut) * longueurParMetre;

    const zone = obtenirZoneDeCalcul();
    const features = [];
    const dejaCetAppel = new Set();

    const batimentsMapbox = map.querySourceFeatures("composite", {
      sourceLayer: "building",
      filter: ["==", "extrude", "true"]
    });

    batimentsMapbox.forEach(feature => {
      const geom = feature.geometry;
      if (!geom) return;

      let hauteur = parseFloat(feature.properties.height);
      if (isNaN(hauteur) || hauteur <= 0) hauteur = 18;

      const polygones = geom.type === "Polygon" ? [geom.coordinates]
                       : geom.type === "MultiPolygon" ? geom.coordinates
                       : null;
      if (!polygones) return;

      polygones.forEach(anneaux => {
        const anneau = anneaux[0];
        if (!anneau || anneau.length < 3) return;

        // Centroïde pour déduplication
        let lonSum = 0, latSum = 0;
        anneau.forEach(([lon, lat]) => { lonSum += lon; latSum += lat; });
        const cle = `${(lonSum / anneau.length).toFixed(5)}_${(latSum / anneau.length).toFixed(5)}_${hauteur.toFixed(0)}`;
        if (dejaCetAppel.has(cle)) return;
        dejaCetAppel.add(cle);

        // Vérification : le bâtiment ou son ombre est-il dans la zone visible ?
        const centreM = gpsVersMetres(lonSum / anneau.length, latSum / anneau.length);
        if (centreM.x < zone.xMin - hauteur * 2 || centreM.x > zone.xMax + hauteur * 2 ||
            centreM.z < zone.zMin - hauteur * 2 || centreM.z > zone.zMax + hauteur * 2) return;

        // Construction du polygone d'ombre :
        // sommets originaux du bâtiment + sommets projetés dans la direction de l'ombre
        const tousPoints = [];
        anneau.forEach(([lon, lat]) => {
          const { x, z } = gpsVersMetres(lon, lat);
          tousPoints.push([x, z]);                                              // sommet original
          tousPoints.push([x + offsetDirX * hauteur, z + offsetDirZ * hauteur]); // sommet projeté
        });

        // L'enveloppe convexe de ces points donne le polygone d'ombre au sol
        const hull = enveloppeConvexe(tousPoints);
        if (hull.length < 3) return;

        const coordsGps = hull.map(([x, z]) => {
          const g = metresVersGps(x, z);
          return [g.lon, g.lat];
        });
        coordsGps.push(coordsGps[0]); // fermeture du polygone

        features.push({
          type: "Feature",
          geometry: { type: "Polygon", coordinates: [coordsGps] },
          properties: {}
        });
      });
    });

    return { type: "FeatureCollection", features };
  }

  // ============================================================
  // Trait indiquant la direction du soleil depuis le centre de la carte
  // ============================================================
  function genererRayonSoleil(dateChoisie) {
    const centre = map.getCenter();
    const position = SunCalc.getPosition(dateChoisie, centre.lat, centre.lng);
    if (position.altitude <= 0) return { type: "FeatureCollection", features: [] };

    const { x, z } = gpsVersMetres(centre.lng, centre.lat);
    const LONGUEUR = 35;
    // Vecteur vers le soleil : (-sin(az), -cos(az)) en (x, z)
    const fin = metresVersGps(
      x - Math.sin(position.azimuth) * LONGUEUR,
      z - Math.cos(position.azimuth) * LONGUEUR
    );

    return {
      type: "FeatureCollection",
      features: [{ type: "Feature", geometry: { type: "LineString", coordinates: [[centre.lng, centre.lat], [fin.lon, fin.lat]] }, properties: {} }]
    };
  }

  // ============================================================
  // Mise en place de la carte
  // ============================================================
  map.on("load", () => {

    // Parcs et zones vertes en vert vif — insérés avant les bâtiments pour être dessous
    map.addLayer({
      id: "parcs-verts",
      source: "composite",
      "source-layer": "landuse",
      type: "fill",
      filter: ["in", "class", "park", "cemetery", "grass"],
      paint: {
        "fill-color": "#7cc48f",
        "fill-opacity": 0.55
      }
    });

    // Cours d'eau et lacs en bleu franc
    map.addLayer({
      id: "eau-bleue",
      source: "composite",
      "source-layer": "water",
      type: "fill",
      paint: {
        "fill-color": "#4a9dd4",
        "fill-opacity": 0.75
      }
    });

    // Bâtiments visuels 3D en gris
    map.addLayer({
      id: "batiments-3d",
      source: "composite",
      "source-layer": "building",
      filter: ["==", "extrude", "true"],
      type: "fill-extrusion",
      minzoom: 14,
      paint: {
        "fill-extrusion-color": "#b8b8b8",
        "fill-extrusion-height": ["get", "height"],
        "fill-extrusion-base": ["get", "min_height"],
        "fill-extrusion-opacity": 0.85
      }
    });

    // Couche d'ombres : polygones semi-transparents projetés depuis les bâtiments
    map.addSource("ombres", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
    map.addLayer({
      id: "ombres-layer",
      type: "fill",
      source: "ombres",
      paint: {
        "fill-color": "#1a2f5a",
        "fill-opacity": 0.30,
        "fill-outline-color": "rgba(0,0,0,0)"
      }
    });

    // Trait de direction du soleil
    map.addSource("rayon-soleil", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
    map.addLayer({
      id: "rayon-soleil-layer",
      type: "line",
      source: "rayon-soleil",
      paint: { "line-color": "#f0b94a", "line-width": 2, "line-dasharray": [1, 1] }
    });

    // Couche POI : cercles colorés selon ensoleillement.
    // Les restaurants ont un contour épais gris foncé, les cafés un contour blanc,
    // pour les différencier visuellement sans dépendre d'emojis (voir explication
    // sur "glyphs > 65535" plus bas).
    map.addSource("poi-lieux", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
    map.addLayer({
      id: "poi-cercles",
      type: "circle",
      source: "poi-lieux",
      paint: {
        "circle-radius": ["case", ["==", ["get", "type"], "restaurant"], 8, 9],
        "circle-color": ["case", ["get", "auSoleil"], "#f0b94a", "#4a6fa5"],
        "circle-stroke-width": ["case", ["==", ["get", "type"], "restaurant"], 3, 2],
        "circle-stroke-color": ["case", ["==", ["get", "type"], "restaurant"], "#333", "white"],
        "circle-opacity": 0.95
      }
    });
    map.addLayer({
      id: "poi-labels",
      type: "symbol",
      source: "poi-lieux",
      minzoom: 17, // n'affiche les noms qu'en très gros plan pour éviter la surcharge Mapbox
      layout: {
        // On enlève l'emoji du label : les emojis (☕ 🍽 📍) sont dans une plage Unicode
        // que Mapbox ne peut pas rendre en tant que texte de carte, ce qui déclenche
        // l'erreur "glyphs > 65535 not supported" en boucle et pollue toute la console.
        // Les emojis restent affichés dans les popups (rendues en HTML natif, sans souci).
        "text-field": ["get", "nom"],
        "text-size": 11,
        "text-offset": [0, 1.4],
        "text-anchor": "top",
        "text-optional": true,
        "text-allow-overlap": false
      },
      paint: {
        "text-color": "#333",
        "text-halo-color": "white",
        "text-halo-width": 1.5
      }
    });

    const inputDate = document.getElementById("input-date");
    const sliderHeure = document.getElementById("slider-heure");
    const affichageHeure = document.getElementById("affichage-heure");
    const statut = document.getElementById("statut");
    const messageZoom = document.getElementById("message-zoom");

    // Initialisation : date d'aujourd'hui, heure actuelle
    const maintenant = new Date();
    inputDate.value = maintenant.toISOString().split("T")[0];
    const minutesActuelles = maintenant.getHours() * 60 + maintenant.getMinutes();
    sliderHeure.value = minutesActuelles;
    // Un .value réglé par JS ne déclenche pas "input" tout seul : sans ce dispatch, le
    // résumé compact (visible par défaut sur mobile, panneau replié) reste bloqué sur le
    // 12:00 codé en dur dans le HTML au lieu de refléter l'heure actuelle.
    sliderHeure.dispatchEvent(new Event("input"));

    // Convertit la valeur du slider (minutes depuis minuit) en objet Date
    function dateChoisie() {
      const minutes = parseInt(sliderHeure.value, 10);
      const hh = Math.floor(minutes / 60).toString().padStart(2, "0");
      const mm = (minutes % 60).toString().padStart(2, "0");
      affichageHeure.textContent = `${hh}:${mm}`;
      return new Date(`${inputDate.value}T${hh}:${mm}:00`);
    }

    // Initialisation de l'affichage de l'heure
    dateChoisie();

    function rafraichirAffichage() {
      const date = dateChoisie();
      map.getSource("ombres")?.setData(genererOmbresBatiments(date));
      map.getSource("rayon-soleil")?.setData(genererRayonSoleil(date));
      messageZoom.style.display = affichageLimite() ? "block" : "none";
      // Le message peut changer la hauteur du contenu : on prévient le panneau mobile
      // (feuille du bas) pour qu'il réajuste sa hauteur animée en conséquence.
      window.dispatchEvent(new Event("panneau-contenu-redimensionne"));
      // Les POI sont rafraîchis séparément via rafraichirPOI(),
      // appelée uniquement sur action explicite (bouton, slider, moveend).
    }

    let delaiRecalcul = null;
    function surTuilesPretes() {
      clearTimeout(delaiRecalcul);
      delaiRecalcul = setTimeout(() => {
        const nb = map.querySourceFeatures("composite", { sourceLayer: "building", filter: ["==", "extrude", "true"] }).length;
        statut.textContent = `${nb} bâtiments visibles.`;
        rafraichirAffichage();
      }, 80);
    }

    map.on("idle", surTuilesPretes);
    map.on("sourcedata", (e) => { if (e.sourceId === "composite" && e.isSourceLoaded) surTuilesPretes(); });
    map.on("moveend", () => {
      clearTimeout(delaiRecalcul);
      delaiRecalcul = setTimeout(() => {
        surTuilesPretes();
        rafraichirPOI();
        majEtatBoutonZone();
      }, 150);
    });
    inputDate.addEventListener("input", () => { rafraichirAffichage(); rafraichirPOI(); });
    sliderHeure.addEventListener("input", () => { rafraichirAffichage(); rafraichirPOI(); });

    rafraichirAffichage();
    map.once("idle", () => { rafraichirPOI(); majEtatBoutonZone(); }); // affiche les POI déjà en cache dès que la carte est prête

    // ----------------------------------------------------------
    // Clic sur la carte → popup avec frise d'ensoleillement sur la journée
    // ----------------------------------------------------------
    let popupClic = null;

    function calculerFriseJournee(lon, lat, date) {
      const segments = [];
      let dernierEtat = null;
      let debutSegment = 0;

      // Les bâtiments visibles ne changent pas d'une tranche horaire à l'autre (seule la
      // position du soleil change) : on les extrait une seule fois avant la boucle, au
      // lieu de rappeler querySourceFeatures() et reparser la géométrie ~100 fois par clic.
      const batiments = extraireBatimentsVisibles();
      const { x, z } = gpsVersMetres(lon, lat);

      for (let minutes = 0; minutes <= 1440; minutes += 15) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        d.setMinutes(minutes);
        const pos = SunCalc.getPosition(d, lat, lon);

        let etat;
        if (pos.altitude <= 0) {
          etat = "nuit";
        } else {
          const longueurParMetre = 1 / Math.tan(pos.altitude);
          const offsetX = Math.sin(pos.azimuth) * longueurParMetre;
          const offsetZ = Math.cos(pos.azimuth) * longueurParMetre;
          etat = estDansOmbre(x, z, offsetX, offsetZ, batiments) ? "ombre" : "soleil";
        }

        if (etat !== dernierEtat) {
          if (dernierEtat !== null) segments.push({ etat: dernierEtat, debut: debutSegment, fin: minutes });
          dernierEtat = etat;
          debutSegment = minutes;
        }
      }
      segments.push({ etat: dernierEtat, debut: debutSegment, fin: 1440 });
      return segments;
    }

    map.on("click", "poi-cercles", (e) => {
      if (!e.features.length) return;
      e.preventDefault();
      const f = e.features[0];
      const { nom, auSoleil, emoji } = f.properties;
      const [lon, lat] = f.geometry.coordinates;
      if (popupClic) { popupClic.remove(); popupClic = null; }

      const date = dateChoisie();
      const segments = calculerFriseJournee(lon, lat, date);
      const minutesSoleil = segments.filter(s => s.etat === "soleil").reduce((sum, s) => sum + s.fin - s.debut, 0);
      const heuresSoleil = Math.floor(minutesSoleil / 60);
      const minSoleil = minutesSoleil % 60;

      let friseHTML = '<div class="frise-journee">';
      segments.forEach(s => {
        friseHTML += `<div class="segment ${s.etat}" style="width:${((s.fin - s.debut) / 1440 * 100).toFixed(2)}%"></div>`;
      });
      friseHTML += '</div>';

      popupClic = new mapboxgl.Popup({ closeButton: true, maxWidth: "260px" })
        .setLngLat([lon, lat])
        .setHTML(`
          <div class="popup-soleil">
            <h4>${emoji} ${echapperHtml(nom)}</h4>
            <p style="margin:0 0 6px;font-size:12px;color:${auSoleil ? "#c47c00" : "#4a6fa5"}">
              ${auSoleil ? "☀️ Au soleil en ce moment" : "🌑 À l'ombre en ce moment"}
            </p>
            ${friseHTML}
            <div class="axe-frise"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span></div>
            <div style="font-size:11px;color:#888;margin-top:4px">
              ☀️ ${heuresSoleil}h${minSoleil > 0 ? minSoleil + "min" : ""} de soleil aujourd'hui
            </div>
          </div>`)
        .addTo(map);
    });

    // Curseur pointeur au survol des POI
    map.on("mouseenter", "poi-cercles", () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mouseleave", "poi-cercles", () => { map.getCanvas().style.cursor = ""; });

    // ----------------------------------------------------------
    // Centres d'intérêt (POI)
    // Les variables et listeners sont définis en dehors de ce callback
    // (voir bas du script) pour garantir leur enregistrement immédiat.
    // rafraichirPOI() est appelée depuis rafraichirAffichage() et depuis
    // les boutons dès que la carte est prête.
    // ----------------------------------------------------------

    // Gestion des boutons de catégorie
    document.querySelectorAll(".btn-categorie").forEach(btn => {
      btn.addEventListener("click", () => {
        const cat = btn.dataset.categorie;
        if (categoriesActives.has(cat)) {
          categoriesActives.delete(cat);
          btn.classList.remove("actif");
        } else {
          categoriesActives.add(cat);
          btn.classList.add("actif");
        }
        rafraichirPOI();
      });
    });

    document.getElementById("checkbox-soleil").addEventListener("change", (e) => {
      seulementAuSoleil = e.target.checked;
      rafraichirPOI();
    });

    // ----------------------------------------------------------
    // Barre de recherche d'adresse
    // ----------------------------------------------------------
    const geocoder = new MapboxGeocoder({
      accessToken: mapboxgl.accessToken,
      mapboxgl: mapboxgl,
      placeholder: "Adresse, café, lieu…",
      language: "fr",
      countries: "fr",  // priorité aux résultats français (retirer pour usage mondial)
      zoom: 17,
      marker: false,     // pas de marqueur : la carte se centre directement
      // Fusionne nos propres résultats OSM (cafés/restaurants par nom) avec les
      // adresses/lieux que Mapbox trouve déjà (villes, rues, monuments) — une seule
      // barre, une seule liste déroulante. Voir rechercheOsmPourGeocoder plus bas.
      externalGeocoder: rechercheOsmPourGeocoder,
      // Le plugin plafonne la liste affichée (et le nombre de résultats Mapbox demandés)
      // à "limit". Nos résultats OSM sont ajoutés EN PREMIER dans la liste fusionnée :
      // avec la valeur par défaut (5), 5 cafés OSM suffisaient à remplir tout le quota et
      // faisaient complètement disparaître les adresses Mapbox. On monte donc la limite
      // et on plafonne nos propres résultats plus bas (voir .slice) pour garder de la
      // place aux deux types de résultats.
      limit: 8
    });
    document.getElementById("conteneur-recherche").appendChild(geocoder.onAdd(map));

    // Le plugin ne met aucun attribut autocomplete sur son <input> ; Safari iOS propose
    // alors ses suggestions de contacts/adresses personnelles au-dessus du clavier
    // (probablement à cause du mot "Adresse" dans le placeholder). On désactive
    // explicitement l'autocomplétion navigateur, qui n'a pas de sens ici de toute façon
    // (les suggestions viennent de Mapbox/notre index, pas de l'historique du champ).
    const geocoderInput = document.querySelector("#conteneur-recherche input");
    if (geocoderInput) {
      geocoderInput.setAttribute("autocomplete", "off");
      geocoderInput.setAttribute("autocorrect", "off");
      geocoderInput.setAttribute("autocapitalize", "off");
      geocoderInput.setAttribute("spellcheck", "false");
      geocoderInput.setAttribute("name", "recherche-carte"); // évite les heuristiques d'autofill basées sur le nom du champ
    }

    geocoder.on("result", (e) => gererResultatGeocoder(e, geocoder));
  });

  // ============================================================
  // Logique POI Cafés (via Overpass / OpenStreetMap)
  // ============================================================
  let seulementAuSoleil = false;
  // Catégories affichées sur la carte, contrôlées par les boutons .btn-categorie
  // (data-categorie). Les deux types sont actifs par défaut : seul le bouton "☕ Cafés"
  // existe dans l'interface, le toggler masque/affiche donc les cafés spécifiquement
  // sans jamais masquer les restaurants (pas de bouton dédié pour ceux-ci).
  let categoriesActives = new Set(["cafe", "restaurant"]);

  // Cache mémoire des cafés par tuile (~800m de côté). Le tuilage sert uniquement
  // au stockage/affichage (poiCache + localStorage) ; la recherche elle-même se fait
  // en un seul appel réseau sur la zone visible, déclenché par le bouton "Chercher
  // dans cette zone" plutôt qu'automatiquement au déplacement de la carte.
  const poiCache = new Map();

  const TAILLE_TUILE_POI = 0.008;
  const CLE_STORAGE = "cafesCache_v3";

  // Surface max (km²) qu'on autorise à rechercher en un coup : au-delà, une requête
  // Overpass sur toute la zone risque de dépasser le timeout serveur (9s) et de ramer
  // à l'affichage. On demande à l'utilisateur de zoomer plutôt que de laisser partir
  // une requête qui va probablement échouer ou traîner.
  const AIRE_MAX_KM2 = 9;

  // Chargement du cache persistant depuis localStorage au démarrage : les tuiles
  // déjà chargées lors des sessions précédentes ne seront pas re-requêtées.
  // Expire au bout de 7 jours pour rester à jour.
  try {
    const brut = localStorage.getItem(CLE_STORAGE);
    if (brut) {
      const stocke = JSON.parse(brut);
      const now = Date.now();
      if (stocke.timestamp && (now - stocke.timestamp) < 7 * 24 * 3600 * 1000) {
        for (const [cle, valeur] of Object.entries(stocke.data)) {
          poiCache.set(cle, valeur);
        }
      }
    }
  } catch (e) { /* cache corrompu, on ignore */ }

  // Sauvegarde du cache en localStorage, debounced pour ne pas écrire à chaque tuile
  let delaiSave = null;
  function sauvegarderCache() {
    clearTimeout(delaiSave);
    delaiSave = setTimeout(() => {
      try {
        const data = {};
        poiCache.forEach((v, k) => { data[k] = v; });
        localStorage.setItem(CLE_STORAGE, JSON.stringify({ timestamp: Date.now(), data }));
      } catch (e) { /* quota dépassé, tant pis */ }
    }, 1000);
  }

  function indexTuilePOI(lon, lat) {
    return { ix: Math.floor(lon / TAILLE_TUILE_POI), iz: Math.floor(lat / TAILLE_TUILE_POI) };
  }

  // On appelle notre propre fonction serverless Vercel (/api/cafes) au lieu
  // d'Overpass directement : ça contourne le blocage CORS (même origine que le site),
  // et c'est le serveur Vercel qui parle à Overpass en coulisses.
  // La fonction attend les coordonnées en paramètres GET (south, west, north, east).
  const URL_API_CAFES = "/api/cafes";

  // Surface (km²) actuellement visible à l'écran, via la même conversion degrés→mètres
  // que le reste de l'app (gpsVersMetres, définie plus haut).
  function aireVisibleKm2() {
    const vue = map.getBounds();
    const min = gpsVersMetres(vue.getWest(), vue.getSouth());
    const max = gpsVersMetres(vue.getEast(), vue.getNorth());
    return (Math.abs(max.x - min.x) / 1000) * (Math.abs(max.z - min.z) / 1000);
  }

  // Active/désactive le bouton de recherche selon la taille de la zone visible,
  // et affiche un message d'invite tant qu'aucune recherche n'a été lancée sur cette zone.
  function majEtatBoutonZone() {
    const btn = document.getElementById("btn-chercher-zone");
    const statut = document.getElementById("statut-recherche-poi");
    if (!btn || typeof map === "undefined") return;
    if (aireVisibleKm2() > AIRE_MAX_KM2) {
      btn.disabled = true;
      statut.textContent = "Zone trop grande — zoomez pour activer la recherche.";
      statut.classList.add("avertissement");
    } else {
      btn.disabled = false;
      statut.classList.remove("avertissement");
      if (!statut.dataset.resultat) statut.textContent = "";
    }
  }

  // Recherche en un seul appel réseau sur la zone actuellement visible (déclenchée
  // par le bouton "Chercher dans cette zone"), plutôt qu'un chargement automatique
  // tuile par tuile à chaque déplacement de la carte.
  async function chercherZoneVisible() {
    if (typeof map === "undefined") return;
    if (aireVisibleKm2() > AIRE_MAX_KM2) return; // garde-fou (le bouton est normalement déjà désactivé)

    const btn = document.getElementById("btn-chercher-zone");
    const statut = document.getElementById("statut-recherche-poi");
    const vue = map.getBounds();
    const south = vue.getSouth(), west = vue.getWest(), north = vue.getNorth(), east = vue.getEast();

    const texteInitial = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Recherche…";
    statut.classList.remove("avertissement");
    statut.textContent = "";
    delete statut.dataset.resultat;

    try {
      const r = await fetch(`${URL_API_CAFES}?south=${south}&west=${west}&north=${north}&east=${east}`);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();

      // Marque comme "chargées" (même vides) toutes les tuiles couvertes par cette
      // recherche, pour que la zone reste affichée en cache lors d'un prochain déplacement.
      const { ix: ixMin, iz: izMin } = indexTuilePOI(west, south);
      const { ix: ixMax, iz: izMax } = indexTuilePOI(east, north);
      for (let ix = ixMin; ix <= ixMax; ix++)
        for (let iz = izMin; iz <= izMax; iz++)
          poiCache.set(`${ix}_${iz}`, []);

      (data.elements || []).forEach(el => {
        if (typeof el.lat !== "number" || typeof el.lon !== "number" || !el.tags) return;
        const type = el.tags.amenity;
        const { ix, iz } = indexTuilePOI(el.lon, el.lat);
        poiCache.get(`${ix}_${iz}`).push({
          lon: el.lon,
          lat: el.lat,
          nom: el.tags.name || (type === "restaurant" ? "Restaurant" : "Café"),
          type
        });
      });

      sauvegarderCache();
      afficherPOI();
      statut.textContent = `${(data.elements || []).length} lieu(x) trouvé(s).`;
      statut.dataset.resultat = "1";
    } catch (e) {
      statut.textContent = "Échec de la recherche, réessayez.";
      statut.classList.add("avertissement");
    } finally {
      btn.disabled = false;
      btn.textContent = texteInitial;
      majEtatBoutonZone();
    }
  }

  document.getElementById("btn-chercher-zone").addEventListener("click", chercherZoneVisible);

  // Complète la barre d'adresse unique avec les cafés/restaurants correspondant au nom
  // tapé (ex. "Café Roma"), en plus des adresses/lieux que Mapbox trouve déjà tout seul
  // (villes, rues, monuments comme "Tour Montparnasse" — pas touché ici). Branché sur
  // le geocoder via son option "externalGeocoder" (voir plus bas) : ses résultats sont
  // fusionnés dans la même liste déroulante, une seule barre au lieu de deux.
  //
  // Contrairement à la version précédente (qui interrogeait Overpass en direct à chaque
  // frappe — lent et bridé par les miroirs publics gratuits), la recherche se fait ici
  // 100% en mémoire sur un index pré-construit (data/cafes-index.json, ~35 000 lieux
  // dans les 24 plus grandes villes françaises, voir scripts/build-index-cafes.js) via
  // Fuse.js pour la tolérance aux fautes/variantes d'orthographe (ex. "café" ≈ "caffè").
  // Aucun aller-retour réseau après le chargement initial de l'index : c'est ce qui
  // donne la réactivité "app native" demandée, au prix d'une couverture limitée à ces
  // villes plutôt que la France entière (à étendre en relançant le script au besoin).
  // Minuscules + accents retirés : "café" et "caffè" doivent se comparer comme "cafe" et
  // "caffe" (2 lettres d'écart, pas 4), sinon Fuse pénalise l'accent comme une vraie
  // faute et "Caffè Roma" sort du seuil de tolérance pour une recherche "café roma".
  function normaliser(texte) {
    return texte.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
  }

  let indexCafesPromesse = null;
  let indexFuse = null;
  let villesConnuesNormalisees = null; // Set des noms de ville de l'index, pour extraireVilleEtNom
  function chargerIndexCafes() {
    if (!indexCafesPromesse) {
      indexCafesPromesse = fetch("data/cafes-index.json")
        .then(r => r.ok ? r.json() : [])
        .then(donnees => {
          indexFuse = new Fuse(donnees, {
            keys: ["n"],
            threshold: 0.35, // tolère les fautes/variantes (café/caffè) sans devenir trop permissif
            ignoreLocation: true,
            includeScore: true,
            getFn: (obj) => normaliser(obj.n) // compare les noms sans accents (voir normaliser)
          });
          villesConnuesNormalisees = new Set(donnees.map(d => normaliser(d.v)));
          return donnees;
        })
        .catch(() => { indexFuse = null; return []; });
    }
    return indexCafesPromesse;
  }
  chargerIndexCafes(); // démarre le chargement dès l'ouverture de la page, avant la première recherche

  // Si la requête se termine par un nom de ville connu de l'index (ex. "café roma
  // cannes"), on l'extrait pour filtrer les résultats sur cette ville plutôt que de
  // laisser "cannes" faire chuter le score de similarité du nom recherché tout entier
  // (Fuse compare la requête ENTIÈRE au champ nom, qui ne contient pas la ville).
  function extraireVilleEtNom(requete) {
    const mots = requete.trim().split(/\s+/);
    for (let n = Math.min(2, mots.length - 1); n >= 1; n--) {
      const suffixe = normaliser(mots.slice(-n).join(" "));
      if (villesConnuesNormalisees.has(suffixe)) {
        return { nomRecherche: mots.slice(0, -n).join(" "), ville: suffixe };
      }
    }
    return { nomRecherche: requete, ville: null };
  }

  async function rechercheOsmPourGeocoder(requete) {
    const brut = requete.trim();
    if (brut.length < 3) return [];
    await chargerIndexCafes();
    if (!indexFuse) return [];

    const { nomRecherche, ville } = extraireVilleEtNom(brut);
    const centre = map.getCenter();
    let resultats = indexFuse.search(normaliser(nomRecherche), { limit: 25 });
    if (ville) resultats = resultats.filter(r => normaliser(r.item.v) === ville);

    return resultats
      // Fuse classe par pertinence textuelle seule ; parmi des scores proches, on
      // préfère les lieux près de la carte actuelle (comportement attendu : "près de moi").
      .map(({ item, score }) => {
        const { x, z } = gpsVersMetres(item.lo, item.la);
        const { x: xc, z: zc } = gpsVersMetres(centre.lng, centre.lat);
        const distanceKm = Math.hypot(x - xc, z - zc) / 1000;
        return { item, score, distanceKm };
      })
      .sort((a, b) => (a.score + a.distanceKm / 500) - (b.score + b.distanceKm / 500))
      .slice(0, 3) // laisse de la place aux résultats Mapbox dans le quota total (voir "limit" du geocoder)
      .map(({ item }) => {
        const type = item.t === "restaurant" ? "restaurant" : "café";
        return {
          type: "Feature",
          place_name: `${item.n} — ${item.v} (${type})`,
          text: item.n,
          center: [item.lo, item.la],
          place_type: ["poi"],
          geometry: { type: "Point", coordinates: [item.lo, item.la] },
          properties: { osmCafe: true, lon: item.lo, lat: item.la, nom: item.n, type: item.t }
        };
      });
  }

  // Appelé pour N'IMPORTE QUEL résultat choisi dans la barre (adresse Mapbox ou café
  // OSM) : la carte commence à voler vers ce résultat via le comportement natif du
  // geocoder — au même moment, on vide le champ et on réduit le panneau sur mobile
  // pour dégager la vue sur la carte qui se déplace, plutôt que de laisser la feuille
  // ouverte et le texte de la recherche affiché après coup.
  function gererResultatGeocoder(e, geocoder) {
    geocoder.clear();
    // geocoder.clear() vide le champ mais ne lui fait pas perdre le focus : sur iPhone,
    // le clavier restait donc affiché après le choix d'un résultat.
    document.activeElement?.blur?.();
    window.dispatchEvent(new Event("resultat-recherche-selectionne"));

    // Si le résultat choisi est un de nos cafés OSM (et non une adresse Mapbox), on
    // l'ajoute au cache des lieux d'intérêt pour qu'il s'affiche comme un marqueur
    // cliquable normal (même popup d'ensoleillement que les autres cafés).
    const props = e.result?.properties;
    if (!props?.osmCafe) return;
    const { ix, iz } = indexTuilePOI(props.lon, props.lat);
    const cle = `${ix}_${iz}`;
    if (!poiCache.has(cle)) poiCache.set(cle, []);
    poiCache.get(cle).push({ lon: props.lon, lat: props.lat, nom: props.nom, type: props.type });
    sauvegarderCache();
    // Le "moveend" qui suit le flyTo redéclenche rafraichirPOI()/afficherPOI() automatiquement.
  }

  document.getElementById("checkbox-soleil").addEventListener("change", (e) => {
    seulementAuSoleil = e.target.checked;
    afficherPOI();
  });

  // ============================================================
  // Panneau rétractable (utile surtout sur mobile où l'espace est précieux)
  // ============================================================
  (function initPanneau() {
    const panneau = document.getElementById("panneau-controle");
    const feuille = document.getElementById("panneau-feuille");
    const btnToggle = document.getElementById("toggle-panneau");
    const icone = document.getElementById("toggle-icone");
    const poignee = document.getElementById("poignee-panneau");
    const contenu = document.getElementById("panneau-contenu");
    const resumeCompact = document.getElementById("resume-compact");
    const resumeHeure = document.getElementById("resume-heure");
    const resumeDate = document.getElementById("resume-date");

    function zoneMobile() {
      return window.innerWidth <= 600 || window.innerHeight <= 500;
    }
    // Hauteur du résumé replié / du contenu déplié (mesurées à la volée : le contenu
    // change de taille selon ce qui s'affiche, ex. le message "dézoom trop important").
    function hauteurRepliee() { return resumeCompact.getBoundingClientRect().height; }
    function hauteurDepliee() { return contenu.getBoundingClientRect().height; }

    function ouvrirPanneau() {
      panneau.classList.remove("replie");
      icone.textContent = "−";
      if (zoneMobile()) {
        feuille.classList.remove("glissement-actif");
        feuille.style.height = hauteurDepliee() + "px";
      }
    }
    function fermerPanneau() {
      panneau.classList.add("replie");
      icone.textContent = "+";
      if (zoneMobile()) {
        feuille.classList.remove("glissement-actif");
        feuille.style.height = hauteurRepliee() + "px";
      }
    }
    function basculerPanneau() {
      if (panneau.classList.contains("replie")) ouvrirPanneau(); else fermerPanneau();
    }

    // État initial : replié par défaut sur mobile/écran bas.
    if (zoneMobile()) {
      panneau.classList.add("replie");
      feuille.style.height = hauteurRepliee() + "px";
    }
    icone.textContent = panneau.classList.contains("replie") ? "+" : "−";

    // ---- Les 3 façons d'ouvrir la feuille (mobile) ----
    // 1) Taper le bouton "+/-" ou la poignée ou le résumé replié.
    // 2) Glisser le doigt vers le haut (voir plus bas).
    // 3) Taper n'importe où ailleurs sur le panneau replié.
    btnToggle.addEventListener("click", (e) => { e.stopPropagation(); basculerPanneau(); });
    poignee.addEventListener("click", (e) => { e.stopPropagation(); basculerPanneau(); });
    resumeCompact.addEventListener("click", (e) => { e.stopPropagation(); basculerPanneau(); });
    panneau.addEventListener("click", () => {
      if (zoneMobile() && panneau.classList.contains("replie")) ouvrirPanneau();
    });

    // ---- Les 3 façons de fermer la feuille (mobile) ----
    // 1) Taper le bouton "+/-". 2) Glisser vers le bas. 3) Taper la carte (façon Google Maps).
    map.on("click", () => {
      if (zoneMobile() && !panneau.classList.contains("replie")) fermerPanneau();
    });

    // ---- Glissement fluide : la feuille suit le doigt en temps réel ----
    // (hauteur + fondu du résumé), puis se cale sur l'état le plus proche au relâchement.
    let glissement = null;
    function progression(hActuelle, hR, hD) {
      if (hD <= hR) return 1;
      return Math.min(1, Math.max(0, (hActuelle - hR) / (hD - hR)));
    }
    function attacherGlissement(element) {
      element.addEventListener("touchstart", (e) => {
        if (!zoneMobile() || glissement) return;
        const hR = hauteurRepliee();
        const hD = hauteurDepliee();
        const hInitiale = panneau.classList.contains("replie") ? hR : hD;
        glissement = { departY: e.touches[0].clientY, hR, hD, hInitiale };
        feuille.classList.add("glissement-actif");
        feuille.style.height = hInitiale + "px";
      }, { passive: true });

      element.addEventListener("touchmove", (e) => {
        if (!glissement) return;
        // preventDefault ici est indispensable : sans lui, Safari iOS interprète le
        // glissement vertical comme un geste natif de la page (rebond/"tirer pour
        // rafraîchir") et prend la main à la place de notre propre animation.
        e.preventDefault();
        const deltaY = e.touches[0].clientY - glissement.departY; // positif = doigt vers le bas
        let h = glissement.hInitiale - deltaY; // doigt vers le haut => hauteur augmente
        h = Math.min(glissement.hD, Math.max(glissement.hR, h));
        feuille.style.height = h + "px";
        resumeCompact.style.opacity = String(1 - progression(h, glissement.hR, glissement.hD));
      }, { passive: false });

      element.addEventListener("touchend", (e) => {
        if (!glissement) return;
        const { departY, hR, hD, hInitiale } = glissement;
        const dernierY = (e.changedTouches[0] || {}).clientY;
        const deltaY = (dernierY ?? departY) - departY;
        const hActuelle = parseFloat(feuille.style.height) || hInitiale;
        const p = progression(hActuelle, hR, hD);
        feuille.classList.remove("glissement-actif");
        resumeCompact.style.opacity = "";
        glissement = null;
        if (p > 0.4) ouvrirPanneau(); else fermerPanneau();
        if (Math.abs(deltaY) > 5) { e.preventDefault(); e.stopPropagation(); }
      });
    }
    attacherGlissement(poignee);
    attacherGlissement(resumeCompact);

    // Fermer en glissant vers le bas depuis n'importe où dans le contenu (pas seulement
    // la poignée) — comme demandé, façon "on peut toujours repousser la feuille vers le
    // bas". Deux garde-fous pour ne pas gêner les usages normaux du contenu :
    // - on ignore les glissements démarrés sur un contrôle interactif (slider, case à
    //   cocher, boutons, champ de recherche/date) pour ne pas casser leur propre geste ;
    // - on n'engage la fermeture que si le contenu est déjà tout en haut de son propre
    //   scroll interne (sinon on laisse d'abord le scroll normal remonter le contenu).
    (function attacherFermetureDepuisContenu() {
      let depart = null;
      contenu.addEventListener("touchstart", (e) => {
        if (!zoneMobile() || glissement || panneau.classList.contains("replie")) return;
        if (e.target.closest("input, button, select, a, .mapboxgl-ctrl-geocoder")) return;
        if (contenu.scrollTop > 0) return;
        depart = e.touches[0].clientY;
      }, { passive: true });

      contenu.addEventListener("touchmove", (e) => {
        if (depart === null) return;
        const deltaY = e.touches[0].clientY - depart;
        if (deltaY <= 0 || contenu.scrollTop > 0) { depart = null; return; }
        e.preventDefault();
        if (!glissement) {
          glissement = { departY: depart, hR: hauteurRepliee(), hD: hauteurDepliee(), hInitiale: hauteurDepliee() };
          feuille.classList.add("glissement-actif");
        }
        let h = glissement.hInitiale - deltaY;
        h = Math.min(glissement.hD, Math.max(glissement.hR, h));
        feuille.style.height = h + "px";
        resumeCompact.style.opacity = String(1 - progression(h, glissement.hR, glissement.hD));
      }, { passive: false });

      contenu.addEventListener("touchend", (e) => {
        depart = null;
        if (!glissement) return;
        const { hR, hD } = glissement;
        const hActuelle = parseFloat(feuille.style.height) || hD;
        const p = progression(hActuelle, hR, hD);
        feuille.classList.remove("glissement-actif");
        resumeCompact.style.opacity = "";
        glissement = null;
        if (p > 0.4) ouvrirPanneau(); else fermerPanneau();
        e.preventDefault();
      });
    })();

    // Réajuste la hauteur de la feuille (mobile) sur sa cible actuelle, tant qu'aucun
    // glissement n'est en cours — utile quand le contenu change de taille (texte plus
    // long, message "dézoom trop important" qui apparaît/disparaît, etc).
    function synchroniserHauteurFeuille() {
      if (zoneMobile() && !glissement) {
        feuille.classList.remove("glissement-actif");
        feuille.style.height = (panneau.classList.contains("replie") ? hauteurRepliee() : hauteurDepliee()) + "px";
      }
    }
    window.addEventListener("panneau-contenu-redimensionne", synchroniserHauteurFeuille);

    // Sélectionner un résultat de recherche (adresse ou café) réduit la feuille sur
    // mobile — la carte qui se déplace vers ce résultat doit rester bien visible plutôt
    // que cachée par le panneau resté ouvert (voir gererResultatGeocoder).
    window.addEventListener("resultat-recherche-selectionne", () => {
      if (zoneMobile()) fermerPanneau();
    });

    // Met à jour le résumé compact quand l'heure ou la date changent
    function majResume() {
      const inputDate = document.getElementById("input-date");
      const sliderHeure = document.getElementById("slider-heure");
      const minutes = parseInt(sliderHeure.value, 10);
      const hh = String(Math.floor(minutes / 60)).padStart(2, "0");
      const mm = String(minutes % 60).padStart(2, "0");
      resumeHeure.textContent = `${hh}:${mm}`;
      const d = inputDate.value ? new Date(inputDate.value) : new Date();
      resumeDate.textContent = d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
      synchroniserHauteurFeuille();
    }
    majResume();
    document.getElementById("input-date").addEventListener("input", majResume);
    document.getElementById("slider-heure").addEventListener("input", majResume);
  })();

  // Réaffiche les POI déjà en cache (aucune requête réseau) : le chargement de
  // nouvelles données se fait uniquement via le bouton "Chercher dans cette zone"
  // (voir chercherZoneVisible), pas automatiquement au déplacement de la carte.
  function rafraichirPOI() {
    afficherPOI();
  }

  function afficherPOI() {
    if (!map?.getSource("poi-lieux")) return;
    const inputDate = document.getElementById("input-date");
    const sliderHeure = document.getElementById("slider-heure");
    const minutes = parseInt(sliderHeure.value, 10);
    const hh = String(Math.floor(minutes / 60)).padStart(2, "0");
    const mm = String(minutes % 60).padStart(2, "0");
    const date = new Date(`${inputDate.value}T${hh}:${mm}:00`);
    const centre = map.getCenter();
    const pos = SunCalc.getPosition(date, centre.lat, centre.lng);

    // Pré-extraction des bâtiments (une seule fois pour tous les cafés)
    let offsetX = 0, offsetZ = 0;
    let batiments = [];
    if (pos.altitude > 0) {
      const lpm = 1 / Math.tan(pos.altitude);
      offsetX = Math.sin(pos.azimuth) * lpm;
      offsetZ = Math.cos(pos.azimuth) * lpm;
      batiments = extraireBatimentsVisibles();
    }

    // Récupère tous les cafés des tuiles visibles depuis le cache
    const vue = map.getBounds();
    const { ix: ixMin, iz: izMin } = indexTuilePOI(vue.getWest(), vue.getSouth());
    const { ix: ixMax, iz: izMax } = indexTuilePOI(vue.getEast(), vue.getNorth());

    const features = [];
    for (let ix = ixMin; ix <= ixMax; ix++) {
      for (let iz = izMin; iz <= izMax; iz++) {
        for (const poi of (poiCache.get(`${ix}_${iz}`) || [])) {
          if (!categoriesActives.has(poi.type)) continue;
          const { x, z } = gpsVersMetres(poi.lon, poi.lat);
          const auSoleil = pos.altitude > 0 && !estDansOmbre(x, z, offsetX, offsetZ, batiments);
          if (seulementAuSoleil && !auSoleil) continue;
          features.push({
            type: "Feature",
            geometry: { type: "Point", coordinates: [poi.lon, poi.lat] },
            properties: {
              nom: poi.nom,
              auSoleil,
              type: poi.type,
              emoji: poi.type === "restaurant" ? "🍽" : "☕" // pour la popup HTML uniquement
            }
          });
        }
      }
    }
    map.getSource("poi-lieux").setData({ type: "FeatureCollection", features });
  }
</script>
